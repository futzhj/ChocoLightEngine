name: Lumen Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    strategy:
      matrix:
        platform: [linux, windows, macos, android]
        build_type: [Release]
        include:
          - platform: linux
            os: ubuntu-22.04
          - platform: windows
            os: windows-2022
          - platform: macos
            os: macos-14
          - platform: android
            os: ubuntu-22.04
        
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v3

    - name: 安装依赖 (Ubuntu)
      if: matrix.platform == 'linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libreadline-dev libncurses-dev patchelf

    - name: 安装依赖 (macOS)
      if: matrix.platform == 'macos'
      run: |
        brew install readline ncurses
    
    - name: 安装依赖 (Android)
      if: matrix.platform == 'android'
      run: |
        sudo apt-get update
        sudo apt-get install -y patchelf
    
    - name: 设置 Android NDK
      if: matrix.platform == 'android'
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r25c
        add-to-path: true
    
    - name: 设置 CMake 缓存
      if: matrix.platform != 'android'
      uses: actions/cache@v3
      with:
        path: |
          ~/.cmake
          ${{github.workspace}}/build
        key: ${{ runner.os }}-cmake-${{ matrix.build_type }}-${{ hashFiles('**/CMakeLists.txt') }}
        restore-keys: |
          ${{ runner.os }}-cmake-${{ matrix.build_type }}-

    - name: 清理 CMake 构建目录 (Linux/macOS/Android)
      if: matrix.platform != 'windows'
      shell: bash
      run: |
        if [[ "${{ matrix.platform }}" == "android" ]]; then
        rm -rf build-android
        else
        rm -rf build
        fi

    - name: 清理 CMake 构建目录 (Windows)
      if: matrix.platform == 'windows'
      shell: cmd
      run: |
        if exist build (rd /s /q build)

    - name: 配置和构建 (Linux)
      if: matrix.platform == 'linux'
      shell: bash
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=${{matrix.build_type}} -DCMAKE_INSTALL_PREFIX="${{github.workspace}}/install"
        cmake --build build --config ${{matrix.build_type}}
        cmake --install build --config ${{matrix.build_type}}

    - name: 配置和构建 (Windows)
      if: matrix.platform == 'windows'
      shell: cmd
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=${{matrix.build_type}} -DCMAKE_INSTALL_PREFIX="${{github.workspace}}/install" -G "Visual Studio 17 2022"
        cmake --build build --config ${{matrix.build_type}}
        cmake --install build --config ${{matrix.build_type}}
    
    - name: 配置和构建 (macOS)
      if: matrix.platform == 'macos'
      shell: bash
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=${{matrix.build_type}} -DCMAKE_INSTALL_PREFIX="${{github.workspace}}/install"
        cmake --build build --config ${{matrix.build_type}}
        cmake --install build --config ${{matrix.build_type}}
    
    - name: 配置和构建 (Android - arm64-v8a)
      if: matrix.platform == 'android'
      shell: bash
      run: |
        mkdir -p ${{github.workspace}}/install/android
        mkdir -p ${{github.workspace}}/build-android
        
        cmake -B ${{github.workspace}}/build-android \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-21 \
          -DCMAKE_BUILD_TYPE=${{matrix.build_type}} \
          -DCMAKE_INSTALL_PREFIX=${{github.workspace}}/install/android
        
        cmake --build ${{github.workspace}}/build-android --config ${{matrix.build_type}}
        cmake --install ${{github.workspace}}/build-android --config ${{matrix.build_type}}

    - name: 测试 (非Android)
      if: matrix.platform != 'android'
      shell: bash
      working-directory: ${{github.workspace}}/build
      run: ctest -C ${{matrix.build_type}} --output-on-failure 