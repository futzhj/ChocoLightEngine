name: Build Templates (All Platforms)

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ==================== Windows (x64) ====================
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # Lumen 模板 (light/lightw/lightc + lua51.dll) — 纯 C++17, 无外部依赖
      - name: Build Lumen
        run: |
          cd lumen-master
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DLUA_USE_COMPAT=ON
          cmake --build build --config Release --target light lightw lightc

      - name: Package Windows Template
        run: |
          mkdir dist\windows-x64
          copy lumen-master\build\src\light\Release\light.exe   dist\windows-x64\light.exe
          copy lumen-master\build\src\light\Release\lightw.exe  dist\windows-x64\lightw.exe
          copy lumen-master\build\src\lightc\Release\lightc.exe dist\windows-x64\lightc.exe
          copy lumen-master\build\lib\lua\Release\lua51.dll     dist\windows-x64\lua51.dll
          copy lumen-master\tools\lightpack.py                  dist\windows-x64\lightpack.py

      - uses: actions/upload-artifact@v4
        with:
          name: template-windows-x64
          path: dist/windows-x64/

  # ==================== Linux (x64) ====================
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake

      - name: Build Lumen
        run: |
          cd lumen-master
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DLUA_USE_COMPAT=ON
          cmake --build build -j$(nproc)

      - name: Package Linux Template
        run: |
          mkdir -p dist/linux-x64
          cp lumen-master/build/src/light/light   dist/linux-x64/ || true
          cp lumen-master/build/src/light/lightw   dist/linux-x64/ || true
          cp lumen-master/build/src/lightc/lightc  dist/linux-x64/ || true
          # Linux shared lib name varies
          find lumen-master/build/lib/lua -name "*.so*" -exec cp {} dist/linux-x64/ \;
          cp lumen-master/tools/lightpack.py       dist/linux-x64/

      - uses: actions/upload-artifact@v4
        with:
          name: template-linux-x64
          path: dist/linux-x64/

  # ==================== macOS (Universal) ====================
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Lumen
        run: |
          cd lumen-master
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
                -DLUA_USE_COMPAT=ON \
                -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"
          cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Package macOS Template
        run: |
          mkdir -p dist/macos-universal
          cp lumen-master/build/src/light/light   dist/macos-universal/ || true
          cp lumen-master/build/src/light/lightw   dist/macos-universal/ || true
          cp lumen-master/build/src/lightc/lightc  dist/macos-universal/ || true
          find lumen-master/build/lib/lua -name "*.dylib" -exec cp {} dist/macos-universal/ \;
          cp lumen-master/tools/lightpack.py       dist/macos-universal/

      - uses: actions/upload-artifact@v4
        with:
          name: template-macos-universal
          path: dist/macos-universal/

  # ==================== Web (Emscripten → WASM) ====================
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.51

      - name: Build Lumen (WASM)
        run: |
          cd lumen-master
          emcmake cmake -B build-web -DCMAKE_BUILD_TYPE=Release \
            -DLUA_USE_COMPAT=ON \
            -DLUA_SKIP_INSTALL=ON
          cmake --build build-web -j$(nproc) || true

      - name: Package Web Template
        run: |
          mkdir -p dist/web
          find lumen-master/build-web -name "*.js" -exec cp {} dist/web/ \; 2>/dev/null || true
          find lumen-master/build-web -name "*.wasm" -exec cp {} dist/web/ \; 2>/dev/null || true
          cat > dist/web/index.html << 'HTMLEOF'
          <!DOCTYPE html><html><head>
          <meta charset="utf-8"><title>ChocoLight Web</title>
          </head><body>
          <canvas id="canvas"></canvas>
          <script>var Module={canvas:document.getElementById('canvas')}</script>
          <script src="light.js"></script>
          </body></html>
          HTMLEOF

      - uses: actions/upload-artifact@v4
        with:
          name: template-web-wasm
          path: dist/web/

  # ==================== Android (NDK → .so) ====================
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Android NDK
        uses: android-actions/setup-android@v3

      - name: Build Lumen (arm64-v8a)
        run: |
          cd lumen-master
          cmake -B build-android \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=Release \
            -DLUA_USE_COMPAT=ON \
            -DLUA_SKIP_INSTALL=ON
          cmake --build build-android -j$(nproc) || true

      - name: Build Lumen (armeabi-v7a)
        run: |
          cd lumen-master
          cmake -B build-android-v7a \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=armeabi-v7a \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=Release \
            -DLUA_USE_COMPAT=ON \
            -DLUA_SKIP_INSTALL=ON
          cmake --build build-android-v7a -j$(nproc) || true

      - name: Package Android Template
        run: |
          mkdir -p dist/android/{arm64-v8a,armeabi-v7a}
          find lumen-master/build-android -name "*.so" -exec cp {} dist/android/arm64-v8a/ \; 2>/dev/null || true
          find lumen-master/build-android-v7a -name "*.so" -exec cp {} dist/android/armeabi-v7a/ \; 2>/dev/null || true
          # Also copy lightc for host
          cp lumen-master/tools/lightpack.py dist/android/

      - uses: actions/upload-artifact@v4
        with:
          name: template-android
          path: dist/android/

  # ==================== iOS (Xcode → static libs) ====================
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Lumen (iOS arm64)
        run: |
          cd lumen-master
          cmake -B build-ios \
            -GXcode \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=15.0 \
            -DCMAKE_BUILD_TYPE=Release \
            -DLUA_USE_COMPAT=ON \
            -DLUA_SKIP_INSTALL=ON
          cmake --build build-ios --config Release -- -quiet || true

      - name: Package iOS Template
        run: |
          mkdir -p dist/ios-arm64
          find lumen-master/build-ios -name "*.a" -exec cp {} dist/ios-arm64/ \; 2>/dev/null || true
          cp lumen-master/tools/lightpack.py dist/ios-arm64/

      - uses: actions/upload-artifact@v4
        with:
          name: template-ios-arm64
          path: dist/ios-arm64/

  # ==================== Release ====================
  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-windows, build-linux, build-macos, build-web, build-android, build-ios]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Archives
        run: |
          cd artifacts
          for dir in template-*; do
            tar czf "${dir}.tar.gz" "$dir"
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
          generate_release_notes: true
