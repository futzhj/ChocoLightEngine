name: Build Templates (All Platforms)

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ==================== Windows (x64) ====================
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # Lumen 模板 (light/lightw/lightc + lua51.dll) — 纯 C++17, 无外部依赖
      - name: Build Lumen
        run: |
          cd lumen-master
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DLUA_USE_COMPAT=ON
          cmake --build build --config Release --target light lightw lightc

      - name: Run smoke script syntax checks
        shell: pwsh
        run: |
          $lightc = "lumen-master\build\src\lightc\Release\lightc.exe"
          Get-ChildItem scripts\smoke -Filter *.lua | ForEach-Object {
            & $lightc -p $_.FullName
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

      # ChocoLight 引擎 (Light.dll) — SDL3 通过 FetchContent 自动获取
      - name: Build ChocoLight Engine
        run: |
          cd ChocoLight
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      - name: Run Windows runtime smoke scripts
        shell: pwsh
        run: |
          $runtimeDir = "lumen-master\build\src\light\Release"
          $coreSmoke = Resolve-Path "scripts\smoke\core_runtime.lua"
          $physicsSmoke = Resolve-Path "scripts\smoke\physics_p0_p1.lua"
          $phase3Smoke = Resolve-Path "scripts\smoke\phase3_runtime.lua"
          $phase3WindowSmoke = Resolve-Path "scripts\smoke\phase3_window_runtime.lua"
          $ioStorageSmoke = Resolve-Path "scripts\smoke\io_storage.lua"
          $localeSmoke = Resolve-Path "scripts\smoke\locale_power_sensor.lua"
          $phaseESmoke = Resolve-Path "scripts\smoke\process_camera_messagebox.lua"
          $phaseFSmoke = Resolve-Path "scripts\smoke\clipboard_url_display_cursor.lua"
          $phaseGSmoke = Resolve-Path "scripts\smoke\gamepad.lua"
          $phaseHSmoke = Resolve-Path "scripts\smoke\guid_system.lua"
          $phaseISmoke = Resolve-Path "scripts\smoke\tray.lua"
          $phaseJSmoke = Resolve-Path "scripts\smoke\hidapi.lua"
          $phaseKSmoke = Resolve-Path "scripts\smoke\haptic.lua"
          $phaseLSmoke = Resolve-Path "scripts\smoke\dialog.lua"
          $phaseMSmoke = Resolve-Path "scripts\smoke\touch.lua"
          $phaseNSmoke = Resolve-Path "scripts\smoke\hints.lua"
          $phaseOSmoke = Resolve-Path "scripts\smoke\time.lua"
          $phasePSmoke = Resolve-Path "scripts\smoke\endian.lua"
          $phaseQSmoke = Resolve-Path "scripts\smoke\log.lua"
          Copy-Item ChocoLight\build\bin\Release\Light.dll $runtimeDir -Force
          & "$runtimeDir\light.exe" $coreSmoke
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & "$runtimeDir\light.exe" $physicsSmoke
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & "$runtimeDir\light.exe" $phase3Smoke
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & "$runtimeDir\light.exe" $phase3WindowSmoke
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & "$runtimeDir\light.exe" $ioStorageSmoke
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & "$runtimeDir\light.exe" $localeSmoke
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & "$runtimeDir\light.exe" $phaseESmoke
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & "$runtimeDir\light.exe" $phaseFSmoke
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & "$runtimeDir\light.exe" $phaseGSmoke
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & "$runtimeDir\light.exe" $phaseHSmoke
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & "$runtimeDir\light.exe" $phaseISmoke
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & "$runtimeDir\light.exe" $phaseJSmoke
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & "$runtimeDir\light.exe" $phaseKSmoke
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & "$runtimeDir\light.exe" $phaseLSmoke
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & "$runtimeDir\light.exe" $phaseMSmoke
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & "$runtimeDir\light.exe" $phaseNSmoke
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & "$runtimeDir\light.exe" $phaseOSmoke
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & "$runtimeDir\light.exe" $phasePSmoke
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & "$runtimeDir\light.exe" $phaseQSmoke
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Package Windows Template
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\windows-x64
          Copy-Item lumen-master\build\src\light\Release\light.exe   dist\windows-x64\
          Copy-Item lumen-master\build\src\light\Release\lightw.exe  dist\windows-x64\
          Copy-Item lumen-master\build\src\lightc\Release\lightc.exe dist\windows-x64\
          Copy-Item lumen-master\build\lib\lua\Release\lua51.dll     dist\windows-x64\
          Copy-Item lumen-master\tools\lightpack.py                  dist\windows-x64\
          if (Test-Path ChocoLight\build\bin\Release\Light.dll) { Copy-Item ChocoLight\build\bin\Release\Light.dll dist\windows-x64\ }

      - uses: actions/upload-artifact@v4
        with:
          name: template-windows-x64
          path: dist/windows-x64/

  # ==================== Linux (x64) ====================
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libreadline-dev \
            libgl-dev xorg-dev libwayland-dev libxkbcommon-dev

      - name: Build Lumen
        run: |
          cd lumen-master
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DLUA_USE_COMPAT=ON
          cmake --build build -j$(nproc)

      - name: Run smoke script syntax checks
        run: |
          for script in scripts/smoke/*.lua; do
            lumen-master/build/src/lightc/lightc -p "$script"
          done

      # ChocoLight 引擎 (libLight.so) - 严格模式, 编译失败即中断 CI
      - name: Build ChocoLight Engine
        run: |
          cd ChocoLight
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(nproc)

      - name: Package Linux Template
        run: |
          mkdir -p dist/linux-x64
          cp lumen-master/build/src/light/light   dist/linux-x64/ || true
          cp lumen-master/build/src/light/lightw   dist/linux-x64/ || true
          cp lumen-master/build/src/lightc/lightc  dist/linux-x64/ || true
          # Linux shared lib name varies
          find lumen-master/build/lib/lua -name "*.so*" -exec cp {} dist/linux-x64/ \;
          find ChocoLight/build/bin -name "*.so*" -exec cp {} dist/linux-x64/ \; 2>/dev/null || true
          cp lumen-master/tools/lightpack.py       dist/linux-x64/

      - uses: actions/upload-artifact@v4
        with:
          name: template-linux-x64
          path: dist/linux-x64/

  # ==================== macOS (Universal) ====================
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Lumen
        run: |
          cd lumen-master
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
                -DLUA_USE_COMPAT=ON \
                -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"
          cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Run smoke script syntax checks
        run: |
          for script in scripts/smoke/*.lua; do
            lumen-master/build/src/lightc/lightc -p "$script"
          done

      # ChocoLight 引擎 (libLight.dylib) - 严格模式, 编译失败即中断 CI
      - name: Build ChocoLight Engine
        run: |
          cd ChocoLight
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"
          cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Package macOS Template
        run: |
          mkdir -p dist/macos-universal
          cp lumen-master/build/src/light/light   dist/macos-universal/ || true
          cp lumen-master/build/src/light/lightw   dist/macos-universal/ || true
          cp lumen-master/build/src/lightc/lightc  dist/macos-universal/ || true
          find lumen-master/build/lib/lua -name "*.dylib" -exec cp {} dist/macos-universal/ \;
          find ChocoLight/build/bin -name "*.dylib" -exec cp {} dist/macos-universal/ \; 2>/dev/null || true
          cp lumen-master/tools/lightpack.py       dist/macos-universal/

      - uses: actions/upload-artifact@v4
        with:
          name: template-macos-universal
          path: dist/macos-universal/

  # ==================== Web (Emscripten → WASM) ====================
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.51

      - name: Build Lumen (WASM)
        run: |
          cd lumen-master
          emcmake cmake -B build-web -DCMAKE_BUILD_TYPE=Release \
            -DLUA_USE_COMPAT=ON \
            -DLUA_SKIP_INSTALL=ON
          cmake --build build-web -j$(nproc) || true

      # ChocoLight 引擎 (libLight.a → 链接到最终 WASM) - 严格模式
      - name: Build ChocoLight Engine (WASM)
        run: |
          cd ChocoLight
          LUMEN_LIB=$(find ../lumen-master/build-web -name "*.a" | head -1)
          emcmake cmake -B build-web -DCMAKE_BUILD_TYPE=Release \
            -DLUMEN_LIB_PATH="$LUMEN_LIB"
          cmake --build build-web -j$(nproc)

      - name: Package Web Template
        run: |
          mkdir -p dist/web
          find lumen-master/build-web -name "*.js" -exec cp {} dist/web/ \; 2>/dev/null || true
          find lumen-master/build-web -name "*.wasm" -exec cp {} dist/web/ \; 2>/dev/null || true
          find ChocoLight/build-web -name "*.a" -exec cp {} dist/web/ \; 2>/dev/null || true
          cp templates/shared/choco_crypt.h dist/web/ 2>/dev/null || true
          cat > dist/web/index.html << 'HTMLEOF'
          <!DOCTYPE html><html><head>
          <meta charset="utf-8"><title>ChocoLight Web</title>
          <style>body{margin:0;background:#000}canvas{display:block;margin:auto}</style>
          </head><body>
          <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
          <script>var Module={canvas:document.getElementById('canvas')}</script>
          <script src="light.js"></script>
          </body></html>
          HTMLEOF

      - uses: actions/upload-artifact@v4
        with:
          name: template-web-wasm
          path: dist/web/

  # ==================== Android (APK) ====================
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # 先 CMake configure 触发 FetchContent 下载 SDL3, 获取 Java 源码
      - name: Fetch SDL3 Sources (for Java files)
        run: |
          cd ChocoLight
          cmake -B build-android-fetch \
            -DCMAKE_SYSTEM_NAME=Android \
            -DCMAKE_ANDROID_NDK=$ANDROID_NDK_ROOT \
            -DCMAKE_ANDROID_ARCH_ABI=arm64-v8a \
            -DCMAKE_ANDROID_STL_TYPE=c++_shared \
            -DCMAKE_BUILD_TYPE=Release || true
          # 复制 SDL3 Java 源码到模板项目
          SDL3_JAVA=$(find build-android-fetch -path "*sdl3-src/android-project/app/src/main/java/org/libsdl/app" -type d | head -1)
          if [ -n "$SDL3_JAVA" ]; then
            mkdir -p ../templates/android-sdl3/app/src/main/java/org/libsdl/app
            cp -v "$SDL3_JAVA"/*.java ../templates/android-sdl3/app/src/main/java/org/libsdl/app/
          else
            echo "WARNING: SDL3 Java sources not found"
          fi

      - name: Build APK (SDL3 + ChocoLight + Lumen)
        run: |
          cd templates/android-sdl3
          gradle wrapper --gradle-version 8.5
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Package Android
        run: |
          mkdir -p dist/android
          echo "=== Searching for APK files ==="
          find templates/android-sdl3 -name "*.apk" -type f
          find templates/android-sdl3 -name "*.apk" -exec cp {} dist/android/ \;
          ls -la dist/android/

      - uses: actions/upload-artifact@v4
        with:
          name: template-android-apk
          path: dist/android/
          if-no-files-found: error

  # ==================== iOS (.app unsigned) ====================
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build iOS app (SDL3 + ChocoLight + Lumen)
        run: |
          cd templates/ios-sdl3
          cmake -B build -GXcode \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=16.4
          cmake --build build --config Release -- -quiet \
            CODE_SIGN_IDENTITY="-" CODE_SIGNING_ALLOWED=NO

      - name: Package iOS
        run: |
          mkdir -p dist/ios
          echo "=== Searching for .app bundles ==="
          find templates/ios-sdl3/build -name "*.app" -type d
          find templates/ios-sdl3/build -name "*.app" -type d -exec cp -r {} dist/ios/ \;
          ls -la dist/ios/

      - uses: actions/upload-artifact@v4
        with:
          name: template-ios-app
          path: dist/ios/
          if-no-files-found: error

  # ==================== Release ====================
  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-windows, build-linux, build-macos, build-web, build-android, build-ios]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Archives
        run: |
          cd artifacts
          for dir in template-*; do
            tar czf "${dir}.tar.gz" "$dir"
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
          generate_release_notes: true
